<div>
  <button (click)="handleClick()">Toggle</button>

  @if (visible()) {
    <p appSomethingElse>Now you see me</p>
  }

  <app-other [appSomething]="0" />

  <input [(ngModel)]="value" />

  <div [(appModel)]="value"></div>
  <div [appModel]="value" (appModelChange)="value = $event ?? null"></div>
</div>
